name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Restore dependencies
        run: dotnet restore src/CdkBase.sln

      - name: Build
        run: dotnet build src/CdkBase.sln --no-restore

      - name: Test
        run: dotnet test src/CdkBase.sln --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Display coverage summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          FOUND_COVERAGE=false
          for f in $(find . -name "coverage.cobertura.xml"); do
            FOUND_COVERAGE=true
            echo "Coverage file: $f" >> $GITHUB_STEP_SUMMARY
            LINE_RATE=$(sed -n 's/.*line-rate="\([^"]*\)".*/\1/p' "$f" | head -1)
            BRANCH_RATE=$(sed -n 's/.*branch-rate="\([^"]*\)".*/\1/p' "$f" | head -1)
            if [ -n "$LINE_RATE" ]; then
              LINE_PCT=$(awk "BEGIN { printf \"%.1f\", $LINE_RATE * 100 }")
              echo "- Line coverage: ${LINE_PCT}%" >> $GITHUB_STEP_SUMMARY
            fi
            if [ -n "$BRANCH_RATE" ]; then
              BRANCH_PCT=$(awk "BEGIN { printf \"%.1f\", $BRANCH_RATE * 100 }")
              echo "- Branch coverage: ${BRANCH_PCT}%" >> $GITHUB_STEP_SUMMARY
            fi
          done
          if [ "$FOUND_COVERAGE" = "false" ]; then
            echo "- **No coverage files found**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: CDK Synth
        run: npx cdk synth

      - name: CDK Synth (environment=dev)
        run: npx cdk synth -c environment=dev

      - name: CDK Synth (environment=prod)
        run: npx cdk synth -c environment=prod

      - name: CDK Diff
        # Advisory only: requires AWS credentials which may not be configured in CI.
        # --no-fail prevents exit code 1 when there are legitimate diffs.
        # continue-on-error allows the workflow to pass even if credentials are missing.
        continue-on-error: true
        run: npx cdk diff --no-fail
